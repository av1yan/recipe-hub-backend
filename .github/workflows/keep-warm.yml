name: Keep backend warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

concurrency:
  group: keep-warm
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.HEALTH_URL }}"
          URL="${URL:-https://recipe-hub-backend-production.up.railway.app/health}"
          echo "Pinging $URL"
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::/health never returned 200"
          exit 1

